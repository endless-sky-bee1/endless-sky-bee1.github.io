<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }
        p {
            line-height: 1.6;
            margin-bottom: 15px;
        }
        a {
            color: #ffd700;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">🚀</div>
        <h1>欢迎来到我的网站！</h1>
        <p>你好，我是 endless，这是我在 GitHub 上的个人网站。</p>
        <p>这里记录着我的技术探索和学习历程。欢迎来访！</p>
        <p>✨ 网站正在建设中，敬请期待更多内容...</p>
        <p>
            <a href="https://github.com/endless-sky-bee1/endless.github.io" target="_blank">访问我的 GitHub 仓库</a>
        </p>
    </div>
</body>
</html>
